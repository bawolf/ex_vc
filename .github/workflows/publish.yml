name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version being published"
        required: true

permissions:
  contents: write

jobs:
  hex-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "27.3"

      - name: Install dependencies
        run: mix deps.get

      - name: Verify package version
        run: grep -q "@version \"${{ github.event.inputs.version }}\"" mix.exs

      - name: Check whether release already exists on Hex
        id: hex_check
        run: |
          if mix hex.info ex_vc | grep -Eq 'Releases: .*\\b${{ github.event.inputs.version }}\\b'; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release gate
        run: mix ex_vc.release.gate

      - name: Publish to Hex
        if: steps.hex_check.outputs.exists != 'true'
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

      - name: Extract release notes
        if: steps.hex_check.outputs.exists != 'true'
        run: |
          awk '
            $0 ~ "^## \\[" "${{ github.event.inputs.version }}" "\\]" {capture=1; next}
            capture && $0 ~ "^## \\[" {exit}
            capture {print}
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"

      - name: Create Git tag
        if: steps.hex_check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          if ! git rev-parse "v${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            git tag "v${{ github.event.inputs.version }}"
            git push origin "v${{ github.event.inputs.version }}"
          fi

      - name: Create GitHub release
        if: steps.hex_check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "v${{ github.event.inputs.version }}" >/dev/null 2>&1; then
            gh release create "v${{ github.event.inputs.version }}" \
              --title "v${{ github.event.inputs.version }}" \
              --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Release already exists
        if: steps.hex_check.outputs.exists == 'true'
        run: echo "Hex release ${{ github.event.inputs.version }} already exists; skipping publish, tag, and GitHub release creation."
