name: Interop or spec mismatch
description: Report a mismatch between ex_vc and W3C, DCB, or Rust behavior
title: "[Interop] "
labels:
  - interop
body:
  - type: dropdown
    id: source
    attributes:
      label: Mismatch source
      options:
        - W3C suite or implementation report
        - TypeScript implementation
        - Rust implementation
        - Multiple sources disagree
    validations:
      required: true
  - type: textarea
    id: surface
    attributes:
      label: Affected surface
      description: VC model, VP boundary, vc+jwt, or parity fixture behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include fixture ids, links, and observed outputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected contract
      description: Which oracle should win, and why?
